<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <defs>
    <linearGradient id="fireGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F97316"><animate attributeName="stop-color" values="#F97316;#EF4444;#EC4899;#F97316" dur="4s" repeatCount="indefinite"/></stop>
      <stop offset="50%" stop-color="#EF4444"><animate attributeName="stop-color" values="#EF4444;#EC4899;#8B5CF6;#EF4444" dur="4s" repeatCount="indefinite"/></stop>
      <stop offset="100%" stop-color="#8B5CF6"><animate attributeName="stop-color" values="#8B5CF6;#3B82F6;#06B6D4;#8B5CF6" dur="4s" repeatCount="indefinite"/></stop>
    </linearGradient>
    <linearGradient id="cyberBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06B6D4"/><stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FDE68A"/><stop offset="50%" stop-color="#FBBF24"/><stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
    <linearGradient id="mintGlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#34D399"/><stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <linearGradient id="neonPurple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A855F7"/><stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>

    <filter id="bigGlow"><feGaussianBlur stdDeviation="10" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="softGlow"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="textShadow"><feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.6"/></filter>
  </defs>

  <!-- ===== BACKGROUND ===== -->
  <rect width="1080" height="1080" fill="#050810"/>

  <!-- Ambient glow orbs (centered) -->
  <ellipse cx="540" cy="460" rx="380" ry="300" fill="#8B5CF6" opacity="0.05"/>
  <ellipse cx="400" cy="410" rx="200" ry="200" fill="#06B6D4" opacity="0.04"/>
  <ellipse cx="680" cy="410" rx="200" ry="200" fill="#EC4899" opacity="0.04"/>

  <!-- Animated outer ring (Instagram circle border) -->
  <circle cx="540" cy="540" r="520" fill="none" stroke="url(#fireGrad)" stroke-width="4" opacity="0.3">
    <animate attributeName="opacity" values="0.3;0.5;0.3" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="540" cy="540" r="510" fill="none" stroke="url(#cyberBlue)" stroke-width="1" opacity="0.15"/>

  <!-- Floating particles -->
  <circle cx="250" cy="300" r="3" fill="#06B6D4" opacity="0.5"><animate attributeName="cy" values="300;288;300" dur="3s" repeatCount="indefinite"/></circle>
  <circle cx="830" cy="330" r="2.5" fill="#EC4899" opacity="0.4"><animate attributeName="cy" values="330;318;330" dur="3.5s" repeatCount="indefinite"/></circle>
  <circle cx="200" cy="760" r="2" fill="#A855F7" opacity="0.3"><animate attributeName="cy" values="760;750;760" dur="4s" repeatCount="indefinite"/></circle>
  <circle cx="880" cy="780" r="2.5" fill="#FBBF24" opacity="0.3"><animate attributeName="cy" values="780;770;780" dur="2.8s" repeatCount="indefinite"/></circle>
  <circle cx="540" cy="220" r="2" fill="#34D399" opacity="0.4"><animate attributeName="cy" values="220;210;220" dur="3.2s" repeatCount="indefinite"/></circle>

  <!-- ===== HEXAGONAL SHIELD ICON ===== -->
  <g transform="translate(540, 340)">
    <!-- Slow rotating outer hex -->
    <g>
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="60s" repeatCount="indefinite"/>
      <polygon points="0,-120 104,-60 104,60 0,120 -104,60 -104,-60" fill="none" stroke="url(#fireGrad)" stroke-width="2.5" opacity="0.25"/>
    </g>
    <!-- Inner hex shell -->
    <polygon points="0,-96 83,-48 83,48 0,96 -83,48 -83,-48" fill="#0A0F1C" stroke="url(#neonPurple)" stroke-width="2.5" opacity="0.6"/>
    <polygon points="0,-74 64,-37 64,37 0,74 -64,37 -64,-37" fill="#0D1220" stroke="url(#cyberBlue)" stroke-width="1.5" opacity="0.35"/>

    <!-- Animated infinity loop -->
    <g filter="url(#bigGlow)">
      <path d="M -42 0 C -42,-32 -16,-32 0,-16 C 16,-32 42,-32 42,0 C 42,32 16,32 0,16 C -16,32 -42,32 -42,0 Z"
            fill="none" stroke="url(#fireGrad)" stroke-width="6" stroke-linecap="round">
        <animate attributeName="stroke-dasharray" values="0,320;320,0" dur="3s" repeatCount="indefinite"/>
      </path>
    </g>

    <!-- Dev brackets -->
    <text x="-22" y="6" font-family="'Consolas',monospace" font-size="20" fill="#06B6D4" text-anchor="middle" font-weight="bold" filter="url(#softGlow)">&lt;/&gt;</text>
    <!-- Gear -->
    <g transform="translate(24, 0)">
      <circle cx="0" cy="0" r="8" fill="none" stroke="#EC4899" stroke-width="2.2"/>
      <circle cx="0" cy="0" r="3" fill="#EC4899"/>
      <g stroke="#EC4899" stroke-width="2.2" stroke-linecap="round">
        <line x1="0" y1="-11" x2="0" y2="-8.5"/><line x1="0" y1="8.5" x2="0" y2="11"/>
        <line x1="-11" y1="0" x2="-8.5" y2="0"/><line x1="8.5" y1="0" x2="11" y2="0"/>
      </g>
    </g>

    <!-- AI sparkle on top -->
    <g transform="translate(0, -58)" filter="url(#softGlow)">
      <polygon points="0,-9 2.2,-2.2 9,0 2.2,2.2 0,9 -2.2,2.2 -9,0 -2.2,-2.2" fill="#FBBF24">
        <animate attributeName="opacity" values="1;0.4;1" dur="2s" repeatCount="indefinite"/>
      </polygon>
    </g>
  </g>

  <!-- ===== "ELITE" LABEL ===== -->
  <text x="540" y="500" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="34" font-weight="800" letter-spacing="24" fill="url(#gold)" filter="url(#softGlow)">E L I T E</text>

  <!-- ===== MAIN TITLE ===== -->
  <g filter="url(#textShadow)">
    <text x="430" y="620" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="130" font-weight="900" fill="#FFFFFF">Dev</text>
    <text x="690" y="620" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="130" font-weight="900" fill="url(#fireGrad)">Ops</text>
  </g>
  <!-- Neon underline -->
  <line x1="500" y1="634" x2="780" y2="634" stroke="url(#fireGrad)" stroke-width="4.5" opacity="0.6" filter="url(#softGlow)"/>

  <!-- ===== PRO BADGE ===== -->
  <g transform="translate(540, 695)">
    <rect x="-58" y="-24" width="116" height="48" rx="11" fill="url(#gold)" filter="url(#softGlow)"/>
    <rect x="-58" y="-24" width="116" height="48" rx="11" fill="url(#gold)" opacity="0.3">
      <animate attributeName="opacity" values="0.3;0.6;0.3" dur="2s" repeatCount="indefinite"/>
    </rect>
    <text x="0" y="9" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="32" font-weight="900" fill="#050810" letter-spacing="6">PRO</text>
  </g>

  <!-- ===== TAGLINE ===== -->
  <text x="540" y="782" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="24" font-weight="500" letter-spacing="7" fill="#94A3B8">LEARN · BUILD · DEPLOY · AUTOMATE</text>

  <!-- ===== REAL-TIME PROJECTS PILL ===== -->
  <g transform="translate(540, 840)">
    <rect x="-200" y="-24" width="400" height="48" rx="24" fill="#0D1A2A" stroke="url(#mintGlow)" stroke-width="2" filter="url(#softGlow)"/>
    <text x="0" y="8" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="21" font-weight="700" letter-spacing="5" fill="#34D399">★  REAL-TIME PROJECTS  ★</text>
  </g>

  <!-- Rotating sparkles -->
  <g transform="translate(200, 540)" opacity="0.4">
    <polygon points="0,-8 1.9,-1.9 8,0 1.9,1.9 0,8 -1.9,1.9 -8,0 -1.9,-1.9" fill="#FBBF24">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="6s" repeatCount="indefinite"/>
    </polygon>
  </g>
  <g transform="translate(880, 540)" opacity="0.4">
    <polygon points="0,-8 1.9,-1.9 8,0 1.9,1.9 0,8 -1.9,1.9 -8,0 -1.9,-1.9" fill="#06B6D4">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="8s" repeatCount="indefinite"/>
    </polygon>
  </g>
  <g transform="translate(540, 920)" opacity="0.3">
    <polygon points="0,-6 1.4,-1.4 6,0 1.4,1.4 0,6 -1.4,1.4 -6,0 -1.4,-1.4" fill="#EC4899">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="5s" repeatCount="indefinite"/>
    </polygon>
  </g>
</svg>