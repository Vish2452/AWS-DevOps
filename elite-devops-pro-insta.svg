<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <defs>
    <linearGradient id="fireGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F97316"><animate attributeName="stop-color" values="#F97316;#EF4444;#EC4899;#F97316" dur="4s" repeatCount="indefinite"/></stop>
      <stop offset="50%" stop-color="#EF4444"><animate attributeName="stop-color" values="#EF4444;#EC4899;#8B5CF6;#EF4444" dur="4s" repeatCount="indefinite"/></stop>
      <stop offset="100%" stop-color="#8B5CF6"><animate attributeName="stop-color" values="#8B5CF6;#3B82F6;#06B6D4;#8B5CF6" dur="4s" repeatCount="indefinite"/></stop>
    </linearGradient>
    <linearGradient id="cyberBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06B6D4"/><stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FDE68A"/><stop offset="50%" stop-color="#FBBF24"/><stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
    <linearGradient id="mintGlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#34D399"/><stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <linearGradient id="neonPurple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A855F7"/><stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>

    <filter id="bigGlow"><feGaussianBlur stdDeviation="10" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="softGlow"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="textShadow"><feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.6"/></filter>

    <!-- Circle clip for Instagram safe zone -->
    <clipPath id="circleClip"><circle cx="540" cy="540" r="500"/></clipPath>
  </defs>

  <!-- ===== BACKGROUND ===== -->
  <rect width="1080" height="1080" fill="#050810"/>

  <!-- Ambient glow orbs (inside circle safe zone) -->
  <ellipse cx="540" cy="400" rx="380" ry="300" fill="#8B5CF6" opacity="0.05"/>
  <ellipse cx="400" cy="350" rx="200" ry="200" fill="#06B6D4" opacity="0.04"/>
  <ellipse cx="680" cy="350" rx="200" ry="200" fill="#EC4899" opacity="0.04"/>

  <!-- Animated outer ring (visible as Instagram circle border) -->
  <circle cx="540" cy="540" r="520" fill="none" stroke="url(#fireGrad)" stroke-width="4" opacity="0.3">
    <animate attributeName="opacity" values="0.3;0.5;0.3" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="540" cy="540" r="510" fill="none" stroke="url(#cyberBlue)" stroke-width="1" opacity="0.15"/>

  <!-- Floating particles -->
  <circle cx="250" cy="250" r="3" fill="#06B6D4" opacity="0.5"><animate attributeName="cy" values="250;238;250" dur="3s" repeatCount="indefinite"/></circle>
  <circle cx="830" cy="280" r="2.5" fill="#EC4899" opacity="0.4"><animate attributeName="cy" values="280;268;280" dur="3.5s" repeatCount="indefinite"/></circle>
  <circle cx="200" cy="700" r="2" fill="#A855F7" opacity="0.3"><animate attributeName="cy" values="700;690;700" dur="4s" repeatCount="indefinite"/></circle>
  <circle cx="880" cy="720" r="2.5" fill="#FBBF24" opacity="0.3"><animate attributeName="cy" values="720;710;720" dur="2.8s" repeatCount="indefinite"/></circle>
  <circle cx="540" cy="180" r="2" fill="#34D399" opacity="0.4"><animate attributeName="cy" values="180;170;180" dur="3.2s" repeatCount="indefinite"/></circle>

  <!-- ===== HEXAGONAL SHIELD ICON ===== -->
  <g transform="translate(540, 290)">
    <!-- Slow rotating outer hex -->
    <g>
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="60s" repeatCount="indefinite"/>
      <polygon points="0,-110 95,-55 95,55 0,110 -95,55 -95,-55" fill="none" stroke="url(#fireGrad)" stroke-width="2" opacity="0.25"/>
    </g>
    <!-- Inner hex shell -->
    <polygon points="0,-88 76,-44 76,44 0,88 -76,44 -76,-44" fill="#0A0F1C" stroke="url(#neonPurple)" stroke-width="2.5" opacity="0.6"/>
    <polygon points="0,-68 59,-34 59,34 0,68 -59,34 -59,-34" fill="#0D1220" stroke="url(#cyberBlue)" stroke-width="1.5" opacity="0.35"/>

    <!-- Animated infinity loop -->
    <g filter="url(#bigGlow)">
      <path d="M -38 0 C -38,-28 -14,-28 0,-14 C 14,-28 38,-28 38,0 C 38,28 14,28 0,14 C -14,28 -38,28 -38,0 Z"
            fill="none" stroke="url(#fireGrad)" stroke-width="5.5" stroke-linecap="round">
        <animate attributeName="stroke-dasharray" values="0,300;300,0" dur="3s" repeatCount="indefinite"/>
      </path>
    </g>

    <!-- Dev brackets -->
    <text x="-20" y="6" font-family="'Consolas',monospace" font-size="18" fill="#06B6D4" text-anchor="middle" font-weight="bold" filter="url(#softGlow)">&lt;/&gt;</text>
    <!-- Gear -->
    <g transform="translate(21, 0)">
      <circle cx="0" cy="0" r="7" fill="none" stroke="#EC4899" stroke-width="2"/>
      <circle cx="0" cy="0" r="2.8" fill="#EC4899"/>
      <g stroke="#EC4899" stroke-width="2" stroke-linecap="round">
        <line x1="0" y1="-10" x2="0" y2="-7.5"/><line x1="0" y1="7.5" x2="0" y2="10"/>
        <line x1="-10" y1="0" x2="-7.5" y2="0"/><line x1="7.5" y1="0" x2="10" y2="0"/>
      </g>
    </g>

    <!-- AI sparkle on top -->
    <g transform="translate(0, -52)" filter="url(#softGlow)">
      <polygon points="0,-8 2,-2 8,0 2,2 0,8 -2,2 -8,0 -2,-2" fill="#FBBF24">
        <animate attributeName="opacity" values="1;0.4;1" dur="2s" repeatCount="indefinite"/>
      </polygon>
    </g>
  </g>

  <!-- ===== "ELITE" LABEL ===== -->
  <text x="540" y="440" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="30" font-weight="800" letter-spacing="22" fill="url(#gold)" filter="url(#softGlow)">E L I T E</text>

  <!-- ===== MAIN TITLE ===== -->
  <g filter="url(#textShadow)">
    <text x="440" y="550" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="120" font-weight="900" fill="#FFFFFF">Dev</text>
    <text x="680" y="550" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="120" font-weight="900" fill="url(#fireGrad)">Ops</text>
  </g>
  <!-- Neon underline -->
  <line x1="510" y1="562" x2="770" y2="562" stroke="url(#fireGrad)" stroke-width="4" opacity="0.6" filter="url(#softGlow)"/>

  <!-- ===== PRO BADGE ===== -->
  <g transform="translate(540, 618)">
    <rect x="-52" y="-22" width="104" height="44" rx="10" fill="url(#gold)" filter="url(#softGlow)"/>
    <rect x="-52" y="-22" width="104" height="44" rx="10" fill="url(#gold)" opacity="0.3">
      <animate attributeName="opacity" values="0.3;0.6;0.3" dur="2s" repeatCount="indefinite"/>
    </rect>
    <text x="0" y="8" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="28" font-weight="900" fill="#050810" letter-spacing="5">PRO</text>
  </g>

  <!-- ===== TAGLINE ===== -->
  <text x="540" y="700" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="22" font-weight="500" letter-spacing="6" fill="#94A3B8">LEARN · BUILD · DEPLOY · AUTOMATE</text>

  <!-- ===== REAL-TIME PROJECTS PILL ===== -->
  <g transform="translate(540, 758)">
    <rect x="-190" y="-22" width="380" height="44" rx="22" fill="#0D1A2A" stroke="url(#mintGlow)" stroke-width="2" filter="url(#softGlow)"/>
    <text x="0" y="8" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="20" font-weight="700" letter-spacing="5" fill="#34D399">★  REAL-TIME PROJECTS  ★</text>
  </g>

  <!-- ===== TECH HIGHLIGHTS (compact for circle crop) ===== -->
  <g transform="translate(540, 830)" font-family="'Segoe UI',Arial,sans-serif" font-size="14" font-weight="700" text-anchor="middle">
    <g transform="translate(-200,0)"><rect x="-42" y="-15" width="84" height="30" rx="15" fill="#0F1729" stroke="#FF9900" stroke-width="1"/><text y="5" fill="#FF9900">AWS</text></g>
    <g transform="translate(-90,0)"><rect x="-46" y="-15" width="92" height="30" rx="15" fill="#0F1729" stroke="#2496ED" stroke-width="1"/><text y="5" fill="#2496ED">DOCKER</text></g>
    <g transform="translate(20,0)"><rect x="-30" y="-15" width="60" height="30" rx="15" fill="#0F1729" stroke="#326CE5" stroke-width="1"/><text y="5" fill="#326CE5">K8s</text></g>
    <g transform="translate(120,0)"><rect x="-50" y="-15" width="100" height="30" rx="15" fill="#0F1729" stroke="#7B42BC" stroke-width="1"/><text y="5" fill="#7B42BC">TERRAFORM</text></g>
    <g transform="translate(232,0)"><rect x="-42" y="-15" width="84" height="30" rx="15" fill="#0F1729" stroke="#D33833" stroke-width="1"/><text y="5" fill="#D33833">JENKINS</text></g>
  </g>

  <g transform="translate(540, 874)" font-family="'Segoe UI',Arial,sans-serif" font-size="14" font-weight="700" text-anchor="middle">
    <g transform="translate(-210,0)" filter="url(#softGlow)"><rect x="-40" y="-15" width="80" height="30" rx="15" fill="#052E20" stroke="url(#mintGlow)" stroke-width="1.3"/><text y="5" fill="#34D399" font-weight="800">AIOps</text></g>
    <g transform="translate(-108,0)" filter="url(#softGlow)"><rect x="-38" y="-15" width="76" height="30" rx="15" fill="#052E20" stroke="url(#mintGlow)" stroke-width="1.3"/><text y="5" fill="#06B6D4" font-weight="800">GenAI</text></g>
    <g transform="translate(0,0)"><rect x="-50" y="-15" width="100" height="30" rx="15" fill="#1C0F14" stroke="#F43F5E" stroke-width="1"/><text y="5" fill="#F43F5E">DevSecOps</text></g>
    <g transform="translate(102,0)"><rect x="-30" y="-15" width="60" height="30" rx="15" fill="#0F1729" stroke="#10B981" stroke-width="1"/><text y="5" fill="#10B981">SRE</text></g>
    <g transform="translate(198,0)"><rect x="-42" y="-15" width="84" height="30" rx="15" fill="#0F1729" stroke="#3776AB" stroke-width="1"/><text y="5" fill="#3776AB">PYTHON</text></g>
  </g>

  <!-- Bottom subtle text -->
  <text x="540" y="940" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="13" font-weight="500" letter-spacing="4" fill="#374151">CI/CD · IaC · CONTAINERS · SERVERLESS · CLOUD NATIVE</text>

  <!-- Rotating sparkles near edges -->
  <g transform="translate(200, 540)" opacity="0.35">
    <polygon points="0,-7 1.7,-1.7 7,0 1.7,1.7 0,7 -1.7,1.7 -7,0 -1.7,-1.7" fill="#FBBF24">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="6s" repeatCount="indefinite"/>
    </polygon>
  </g>
  <g transform="translate(880, 540)" opacity="0.35">
    <polygon points="0,-7 1.7,-1.7 7,0 1.7,1.7 0,7 -1.7,1.7 -7,0 -1.7,-1.7" fill="#06B6D4">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="8s" repeatCount="indefinite"/>
    </polygon>
  </g>
</svg>