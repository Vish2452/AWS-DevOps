<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <!-- Gradient for the infinity/DevOps loop -->
    <linearGradient id="loopGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00B4D8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#6C63FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF6B6B;stop-opacity:1" />
    </linearGradient>

    <!-- Gradient for background shield -->
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F172A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1E293B;stop-opacity:1" />
    </linearGradient>

    <!-- Gold accent gradient -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F59E0B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FBBF24;stop-opacity:1" />
    </linearGradient>

    <!-- Glow filter -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Shadow filter -->
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" rx="20" ry="20" fill="#0F172A"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.05">
    <line x1="0" y1="50" x2="800" y2="50" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="100" x2="800" y2="100" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="150" x2="800" y2="150" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="200" x2="800" y2="200" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="250" x2="800" y2="250" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="300" x2="800" y2="300" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="350" x2="800" y2="350" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="400" x2="800" y2="400" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="450" x2="800" y2="450" stroke="#fff" stroke-width="0.5"/>
    <line x1="50" y1="0" x2="50" y2="500" stroke="#fff" stroke-width="0.5"/>
    <line x1="100" y1="0" x2="100" y2="500" stroke="#fff" stroke-width="0.5"/>
    <line x1="150" y1="0" x2="150" y2="500" stroke="#fff" stroke-width="0.5"/>
    <line x1="200" y1="0" x2="200" y2="500" stroke="#fff" stroke-width="0.5"/>
    <line x1="250" y1="0" x2="250" y2="500" stroke="#fff" stroke-width="0.5"/>
    <line x1="300" y1="0" x2="300" y2="500" stroke="#fff" stroke-width="0.5"/>
    <line x1="350" y1="0" x2="350" y2="500" stroke="#fff" stroke-width="0.5"/>
    <line x1="400" y1="0" x2="400" y2="500" stroke="#fff" stroke-width="0.5"/>
    <line x1="450" y1="0" x2="450" y2="500" stroke="#fff" stroke-width="0.5"/>
    <line x1="500" y1="0" x2="500" y2="500" stroke="#fff" stroke-width="0.5"/>
    <line x1="550" y1="0" x2="550" y2="500" stroke="#fff" stroke-width="0.5"/>
    <line x1="600" y1="0" x2="600" y2="500" stroke="#fff" stroke-width="0.5"/>
    <line x1="650" y1="0" x2="650" y2="500" stroke="#fff" stroke-width="0.5"/>
    <line x1="700" y1="0" x2="700" y2="500" stroke="#fff" stroke-width="0.5"/>
    <line x1="750" y1="0" x2="750" y2="500" stroke="#fff" stroke-width="0.5"/>
  </g>

  <!-- Decorative corner accents -->
  <path d="M 20 60 L 20 20 L 60 20" fill="none" stroke="#F59E0B" stroke-width="2" opacity="0.6"/>
  <path d="M 740 20 L 780 20 L 780 60" fill="none" stroke="#F59E0B" stroke-width="2" opacity="0.6"/>
  <path d="M 20 440 L 20 480 L 60 480" fill="none" stroke="#F59E0B" stroke-width="2" opacity="0.6"/>
  <path d="M 740 480 L 780 480 L 780 440" fill="none" stroke="#F59E0B" stroke-width="2" opacity="0.6"/>

  <!-- Central DevOps Infinity Loop Symbol -->
  <g transform="translate(400, 175)" filter="url(#glow)">
    <!-- Infinity loop (DevOps symbol) -->
    <path d="M -80 0 
             C -80 -45, -35 -45, 0 -20 
             C 35 -45, 80 -45, 80 0 
             C 80 45, 35 45, 0 20 
             C -35 45, -80 45, -80 0 Z" 
          fill="none" stroke="url(#loopGradient)" stroke-width="8" stroke-linecap="round"/>
    
    <!-- Dev side icon (code brackets) -->
    <text x="-48" y="8" font-family="monospace" font-size="28" fill="#00B4D8" font-weight="bold" text-anchor="middle">&lt;/&gt;</text>
    
    <!-- Ops side icon (gear) -->
    <g transform="translate(48, 0)">
      <circle cx="0" cy="0" r="10" fill="none" stroke="#FF6B6B" stroke-width="2.5"/>
      <circle cx="0" cy="0" r="4" fill="#FF6B6B"/>
      <line x1="0" y1="-14" x2="0" y2="-10" stroke="#FF6B6B" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="0" y1="10" x2="0" y2="14" stroke="#FF6B6B" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="-14" y1="0" x2="-10" y2="0" stroke="#FF6B6B" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="10" y1="0" x2="14" y2="0" stroke="#FF6B6B" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="-10" y1="-10" x2="-7" y2="-7" stroke="#FF6B6B" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="7" y1="7" x2="10" y2="10" stroke="#FF6B6B" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="10" y1="-10" x2="7" y2="-7" stroke="#FF6B6B" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="-7" y1="7" x2="-10" y2="10" stroke="#FF6B6B" stroke-width="2.5" stroke-linecap="round"/>
    </g>

    <!-- Small orbiting dots representing CI/CD pipeline -->
    <circle cx="-65" cy="-30" r="4" fill="#00B4D8" opacity="0.8"/>
    <circle cx="0" cy="-35" r="4" fill="#6C63FF" opacity="0.8"/>
    <circle cx="65" cy="-30" r="4" fill="#FF6B6B" opacity="0.8"/>
  </g>

  <!-- "ELITE" text -->
  <text x="400" y="270" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="18" font-weight="700" letter-spacing="14" fill="url(#goldGrad)" filter="url(#glow)">ELITE</text>

  <!-- "DevOps" text - main title -->
  <text x="400" y="330" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="72" font-weight="900" letter-spacing="3" fill="#FFFFFF" filter="url(#shadow)">
    Dev<tspan fill="url(#loopGradient)">Ops</tspan>
  </text>

  <!-- "PRO" badge -->
  <g transform="translate(608, 298)">
    <rect x="0" y="0" width="62" height="28" rx="4" fill="url(#goldGrad)"/>
    <text x="31" y="20" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="16" font-weight="900" fill="#0F172A" letter-spacing="3">PRO</text>
  </g>

  <!-- Divider line -->
  <line x1="250" y1="355" x2="550" y2="355" stroke="url(#loopGradient)" stroke-width="2" opacity="0.5"/>

  <!-- Tagline -->
  <text x="400" y="385" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="14" font-weight="400" letter-spacing="5" fill="#94A3B8">LEARN  ·  BUILD  ·  DEPLOY</text>

  <!-- Sub-tagline: Real-Time Projects -->
  <g transform="translate(400, 420)">
    <rect x="-145" y="-18" width="290" height="32" rx="16" fill="none" stroke="#6C63FF" stroke-width="1.5" opacity="0.6"/>
    <text x="0" y="4" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="13" font-weight="600" letter-spacing="3" fill="#A78BFA">★  REAL-TIME PROJECTS  ★</text>
  </g>

  <!-- Tech stack icons row -->
  <g transform="translate(400, 462)" opacity="0.5">
    <text x="-250" y="5" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#64748B" letter-spacing="1">AWS</text>
    <text x="-175" y="5" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#64748B" letter-spacing="1">DOCKER</text>
    <text x="-90" y="5" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#64748B" letter-spacing="1">K8s</text>
    <text x="-20" y="5" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#64748B" letter-spacing="1">TERRAFORM</text>
    <text x="75" y="5" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#64748B" letter-spacing="1">JENKINS</text>
    <text x="160" y="5" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#64748B" letter-spacing="1">ANSIBLE</text>
    <text x="240" y="5" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#64748B" letter-spacing="1">PYTHON</text>
  </g>
</svg>