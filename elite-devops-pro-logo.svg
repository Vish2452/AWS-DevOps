<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 480" width="1100" height="480">
  <defs>
    <!-- Animated gradient -->
    <linearGradient id="fireGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F97316"><animate attributeName="stop-color" values="#F97316;#EF4444;#EC4899;#F97316" dur="4s" repeatCount="indefinite"/></stop>
      <stop offset="50%" stop-color="#EF4444"><animate attributeName="stop-color" values="#EF4444;#EC4899;#8B5CF6;#EF4444" dur="4s" repeatCount="indefinite"/></stop>
      <stop offset="100%" stop-color="#8B5CF6"><animate attributeName="stop-color" values="#8B5CF6;#3B82F6;#06B6D4;#8B5CF6" dur="4s" repeatCount="indefinite"/></stop>
    </linearGradient>

    <linearGradient id="cyberBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06B6D4"/><stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
    <linearGradient id="neonPurple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A855F7"/><stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FDE68A"/><stop offset="50%" stop-color="#FBBF24"/><stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
    <linearGradient id="mintGlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#34D399"/><stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <linearGradient id="hotPink" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F43F5E"/><stop offset="100%" stop-color="#EC4899"/>
    </linearGradient>

    <!-- Glow effects -->
    <filter id="bigGlow"><feGaussianBlur stdDeviation="8" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="softGlow"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="neonGlow"><feGaussianBlur stdDeviation="12" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="shadow"><feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.6"/></filter>

    <!-- Clip for the rotating ring -->
    <clipPath id="hexClip">
      <polygon points="0,-72 62,-36 62,36 0,72 -62,36 -62,-36"/>
    </clipPath>
  </defs>

  <!-- ===== BACKGROUND ===== -->
  <rect width="1100" height="680" rx="0" fill="#050810"/>

  <!-- Radial ambient lights -->
  <ellipse cx="550" cy="280" rx="500" ry="280" fill="#8B5CF6" opacity="0.04"/>
  <ellipse cx="300" cy="200" rx="250" ry="200" fill="#06B6D4" opacity="0.03"/>
  <ellipse cx="800" cy="200" rx="250" ry="200" fill="#EC4899" opacity="0.03"/>
  <ellipse cx="550" cy="150" rx="300" ry="130" fill="#3B82F6" opacity="0.04"/>

  <!-- Animated particle dots -->
  <circle cx="120" cy="100" r="2" fill="#06B6D4" opacity="0.6"><animate attributeName="cy" values="100;90;100" dur="3s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.6;1;0.6" dur="3s" repeatCount="indefinite"/></circle>
  <circle cx="250" cy="180" r="1.5" fill="#A855F7" opacity="0.5"><animate attributeName="cy" values="180;168;180" dur="4s" repeatCount="indefinite"/></circle>
  <circle cx="880" cy="120" r="2" fill="#EC4899" opacity="0.5"><animate attributeName="cy" values="120;108;120" dur="3.5s" repeatCount="indefinite"/></circle>
  <circle cx="950" cy="200" r="1.5" fill="#06B6D4" opacity="0.4"><animate attributeName="cy" values="200;190;200" dur="2.8s" repeatCount="indefinite"/></circle>
  <circle cx="180" cy="350" r="1.5" fill="#FBBF24" opacity="0.4"><animate attributeName="cy" values="350;340;350" dur="3.2s" repeatCount="indefinite"/></circle>
  <circle cx="970" cy="380" r="2" fill="#34D399" opacity="0.5"><animate attributeName="cy" values="380;370;380" dur="2.5s" repeatCount="indefinite"/></circle>
  <circle cx="80" cy="450" r="1.5" fill="#8B5CF6" opacity="0.3"><animate attributeName="cy" values="450;440;450" dur="4s" repeatCount="indefinite"/></circle>
  <circle cx="1020" cy="500" r="1.5" fill="#F43F5E" opacity="0.3"><animate attributeName="cy" values="500;492;500" dur="3s" repeatCount="indefinite"/></circle>

  <!-- Connecting circuit lines (subtle) -->
  <g opacity="0.06" stroke="#06B6D4" stroke-width="1">
    <line x1="60" y1="340" x2="200" y2="280"/>
    <line x1="200" y1="280" x2="300" y2="310"/>
    <line x1="900" y1="280" x2="1040" y2="340"/>
    <line x1="800" y1="310" x2="900" y2="280"/>
    <circle cx="200" cy="280" r="3" fill="#06B6D4"/>
    <circle cx="900" cy="280" r="3" fill="#06B6D4"/>
  </g>

  <!-- ===== CENTRAL ICON: Hexagonal Shield with Animated Infinity ===== -->
  <g transform="translate(550, 130)">
    <!-- Outer rotating hex ring -->
    <g>
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="60s" repeatCount="indefinite"/>
      <polygon points="0,-80 69,-40 69,40 0,80 -69,40 -69,-40" fill="none" stroke="url(#fireGrad)" stroke-width="1.5" opacity="0.3"/>
    </g>
    <!-- Static inner hex -->
    <polygon points="0,-62 54,-31 54,31 0,62 -54,31 -54,-31" fill="#0A0F1C" stroke="url(#neonPurple)" stroke-width="2" opacity="0.7"/>
    <polygon points="0,-48 42,-24 42,24 0,48 -42,24 -42,-24" fill="#0D1220" stroke="url(#cyberBlue)" stroke-width="1" opacity="0.4"/>

    <!-- Infinity loop with glow -->
    <g filter="url(#bigGlow)">
      <path d="M -28 0 C -28,-20 -10,-20 0,-10 C 10,-20 28,-20 28,0 C 28,20 10,20 0,10 C -10,20 -28,20 -28,0 Z"
            fill="none" stroke="url(#fireGrad)" stroke-width="4" stroke-linecap="round">
        <animate attributeName="stroke-dasharray" values="0,200;200,0" dur="3s" repeatCount="indefinite"/>
      </path>
    </g>

    <!-- Dev brackets -->
    <text x="-15" y="4" font-family="'Consolas',monospace" font-size="13" fill="#06B6D4" text-anchor="middle" font-weight="bold" filter="url(#softGlow)">&lt;/&gt;</text>
    <!-- Ops gear -->
    <g transform="translate(15, 0)">
      <circle cx="0" cy="0" r="5" fill="none" stroke="#EC4899" stroke-width="1.5"/>
      <circle cx="0" cy="0" r="2" fill="#EC4899"/>
      <g stroke="#EC4899" stroke-width="1.5" stroke-linecap="round">
        <line x1="0" y1="-7.5" x2="0" y2="-5.5"/><line x1="0" y1="5.5" x2="0" y2="7.5"/>
        <line x1="-7.5" y1="0" x2="-5.5" y2="0"/><line x1="5.5" y1="0" x2="7.5" y2="0"/>
      </g>
    </g>

    <!-- AI sparkle -->
    <g transform="translate(0, -38)" filter="url(#softGlow)" opacity="0.9">
      <polygon points="0,-6 1.5,-1.5 6,0 1.5,1.5 0,6 -1.5,1.5 -6,0 -1.5,-1.5" fill="#FBBF24">
        <animate attributeName="opacity" values="0.9;0.4;0.9" dur="2s" repeatCount="indefinite"/>
      </polygon>
    </g>
  </g>

  <!-- ===== "ELITE" LABEL ===== -->
  <text x="550" y="230" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="20" font-weight="800" letter-spacing="18" fill="url(#gold)" filter="url(#softGlow)">E L I T E</text>

  <!-- ===== MAIN TITLE ===== -->
  <g filter="url(#shadow)">
    <!-- "Dev" in white -->
    <text x="430" y="320" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="100" font-weight="900" fill="#FFFFFF">Dev</text>
    <!-- "Ops" in animated gradient -->
    <text x="640" y="320" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="100" font-weight="900" fill="url(#fireGrad)">Ops</text>
  </g>
  <!-- Neon underline on "Ops" -->
  <line x1="555" y1="328" x2="728" y2="328" stroke="url(#fireGrad)" stroke-width="3" opacity="0.6" filter="url(#softGlow)"/>

  <!-- ===== PRO BADGE (Premium gold with shine) ===== -->
  <g transform="translate(752, 268)">
    <rect width="78" height="38" rx="8" fill="url(#gold)" filter="url(#softGlow)"/>
    <!-- Shine sweep -->
    <rect width="78" height="38" rx="8" fill="url(#gold)" opacity="0.3">
      <animate attributeName="opacity" values="0.3;0.6;0.3" dur="2s" repeatCount="indefinite"/>
    </rect>
    <text x="39" y="27" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="22" font-weight="900" fill="#050810" letter-spacing="4">PRO</text>
  </g>

  <!-- ===== ANIMATED DIVIDER ===== -->
  <line x1="250" y1="348" x2="850" y2="348" stroke="url(#cyberBlue)" stroke-width="1" opacity="0.25"/>
  <line x1="400" y1="348" x2="700" y2="348" stroke="url(#fireGrad)" stroke-width="2" opacity="0.5">
    <animate attributeName="x1" values="400;350;400" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="x2" values="700;750;700" dur="3s" repeatCount="indefinite"/>
  </line>

  <!-- ===== TAGLINE ===== -->
  <text x="550" y="384" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="15" font-weight="500" letter-spacing="6" fill="#94A3B8">LEARN  ·  BUILD  ·  DEPLOY  ·  AUTOMATE</text>

  <!-- ===== REAL-TIME PROJECTS (Glowing pill) ===== -->
  <g transform="translate(550, 422)">
    <rect x="-155" y="-18" width="310" height="36" rx="18" fill="#0D1A2A" stroke="url(#mintGlow)" stroke-width="1.5" filter="url(#softGlow)"/>
    <text x="0" y="6" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="14" font-weight="700" letter-spacing="4" fill="#34D399">★  REAL-TIME PROJECTS  ★</text>
  </g>

  <!-- ===== ANIMATED BORDER GLOW ===== -->
  <rect x="2" y="2" width="1096" height="476" rx="0" fill="none" stroke="url(#fireGrad)" stroke-width="2" opacity="0.15">
    <animate attributeName="opacity" values="0.15;0.3;0.15" dur="3s" repeatCount="indefinite"/>
  </rect>
  <rect x="8" y="8" width="1084" height="464" rx="0" fill="none" stroke="url(#cyberBlue)" stroke-width="0.5" opacity="0.1"/>

  <!-- Corner accent lights -->
  <g filter="url(#softGlow)" opacity="0.7">
    <path d="M 15 55 L 15 15 L 55 15" fill="none" stroke="url(#gold)" stroke-width="2.5"/>
    <path d="M 1045 15 L 1085 15 L 1085 55" fill="none" stroke="url(#gold)" stroke-width="2.5"/>
    <path d="M 15 425 L 15 465 L 55 465" fill="none" stroke="url(#gold)" stroke-width="2.5"/>
    <path d="M 1045 465 L 1085 465 L 1085 425" fill="none" stroke="url(#gold)" stroke-width="2.5"/>
  </g>

  <!-- Rotating sparkle accents -->
  <g transform="translate(150, 280)" opacity="0.4">
    <polygon points="0,-5 1.2,-1.2 5,0 1.2,1.2 0,5 -1.2,1.2 -5,0 -1.2,-1.2" fill="#FBBF24">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="6s" repeatCount="indefinite"/>
    </polygon>
  </g>
  <g transform="translate(950, 280)" opacity="0.4">
    <polygon points="0,-5 1.2,-1.2 5,0 1.2,1.2 0,5 -1.2,1.2 -5,0 -1.2,-1.2" fill="#06B6D4">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="8s" repeatCount="indefinite"/>
    </polygon>
  </g>
</svg>